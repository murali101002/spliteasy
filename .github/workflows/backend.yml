name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/backend/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: spliteasy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: packages/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: packages/backend/package-lock.json

      - run: npm ci

      - run: npx prisma generate

      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/spliteasy_test

      - run: npm run test -- --testPathPattern='unit'
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/spliteasy_test
          JWT_SECRET: test-ci-secret-key-at-least-32-chars
          FRONTEND_URL: http://localhost:5173

      - run: npm run test:coverage -- --testPathPattern='unit'
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/spliteasy_test
          JWT_SECRET: test-ci-secret-key-at-least-32-chars
          FRONTEND_URL: http://localhost:5173

      - run: npm run type-check

      - run: npm run lint
